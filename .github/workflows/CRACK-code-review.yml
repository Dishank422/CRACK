name: "CRACK: AI Code Reviewer"
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request number"
        required: true
jobs:
  review:
    runs-on: ubuntu-latest
    permissions: { contents: read, pull-requests: write } # 'write' for leaving the summary comment
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        # Checkout PR head to process actual changes (including forks).
        #
        # ⚠️ SECURITY: This exposes secrets to fork code. Mitigate by:
        #   1. Requiring approval for running fork pull request workflows from all external contributors
        #      (Settings → Actions → General → Approval for running fork pull request workflows from contributors)
        #   2. Reviewing PRs for secret exfiltration and other malicious code before approving workflow runs.
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with: { python-version: "3.13" }

    - name: Install CRACK
      run: |
        uv sync --all-groups
        echo "$PWD/.venv/bin" >> $GITHUB_PATH

    - name: Restore embedding cache
      uses: actions/cache@v4
      with:
        path: .crack-embeddings
        key: crack-embeddings-${{ github.head_ref || github.ref_name }}
        restore-keys: crack-embeddings-

    - name: Run agent-based AI code review
      env:
        # Legacy: needed by bootstrap/microcore which runs before our agent code
        LLM_API_TYPE: google
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        MODEL: gemini-2.5-flash
        # Agent config: PydanticAI reads GEMINI_API_KEY for Google models
        CRACK_AGENT_MODEL: google-gla:gemini-2.5-flash
        GEMINI_API_KEY: ${{ secrets.LLM_API_KEY }}
        CRACK_DEBUG: "1"
        PR_NUMBER_FROM_WORKFLOW_DISPATCH: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CODE_CHECKS: "modularity,exception_handling,style"
      run: |
        CRACK --verbose agent-review --pr ${{ github.event.inputs.pr_number || github.event.pull_request.number }} --post-to-github

    - uses: actions/upload-artifact@v6
      with:
        name: CRACK-code-review-results
        path: |
          agent-review-result.json
